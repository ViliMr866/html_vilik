<h2>for</h2>
<p>Cyklus for slouží k opakování části programu vícekrát.<br>
<br>
<div class="ukazka">
for i in range(3):<br>
    print("Ahoj")<br>
</div>
<br>
Program vypíše slovo „Ahoj“ třikrát. Cykly jsou důležité například při práci se seznamy nebo opakovaném vypisování dat.</p>
