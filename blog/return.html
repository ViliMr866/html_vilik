<h2>return</h2>
<p>return vrací hodnotu z funkce zpět do programu.<br>
<br>
<div class="ukazka">
def nasobeni(a, b):<br>
    return a * b<br>
<br>
print(nasobeni(4, 5))<br>
</div>
<br>
Pomocí return může funkce vypočítat výsledek a předat ho dál.</p>
