<h2>else</h2>
<p>else určuje, co má program udělat v případě, že podmínka v if není splněna.<br>
<br>
<div class="ukazka">
heslo = "abc"<br>
<br>
if heslo == "1234":<br>
    print("Správné heslo")<br>
else:<br>
    print("Špatné heslo")<br>
</div>
<br>
Díky else může program reagovat na více možných situací a působí chytřeji a praktičtěji.</p>
