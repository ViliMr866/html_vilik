<h2>while</h2>
<p>Cyklus while opakuje kód tak dlouho, dokud platí určitá podmínka.<br>
<br>
<div class="ukazka">
x = 1<br>
<br>
while x <= 5:<br>
    print(x)<br>
    x += 1<br>
</div>
<br>
Používá se například u her, menu nebo programů běžících stále dokola.</p>
