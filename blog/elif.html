<h2>elif</h2>
<p>elif umožňuje přidat další podmínky mezi if a else.<br>
<br>
body = 75<br>
<br>
if body >= 90:<br>
    print("Známka 1")<br>
elif body >= 70:<br>
    print("Známka 2")<br>
else:<br>
    print("Horší známka")<br>
<br>
Program postupně kontroluje jednotlivé podmínky a vykoná první, která platí.</p>
